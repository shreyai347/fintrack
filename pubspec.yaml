name: fintrack
description: FinTrack Pro - Offline personal finance (Flutter, offline-first).
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  drift: ^2.30.0
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  shared_preferences: ^2.5.3
  dynamic_color: ^1.8.1
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  camera: ^0.12.0+1
  image_cropper: ^12.2.1
  share_plus: ^13.1.0
  qr_flutter: ^4.1.0
  csv: ^8.0.0
  permission_handler: ^12.0.1
  package_info_plus: ^10.1.0
  workmanager: ^0.9.0+3
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  drift_dev: ^2.30.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/splash.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/splash.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/